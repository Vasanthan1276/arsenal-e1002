<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
>

<title>Arsenal Dashboard</title>

<style>

/* =========================================================
   ARSENAL E1002 DASHBOARD

   Native display resolution:
   800 x 480

   Designed specifically for monochrome e-paper.
   ========================================================= */


/* =========================================================
   GLOBAL
   ========================================================= */

* {
  box-sizing: border-box;
}


html,
body {

  margin: 0;
  padding: 0;

  width: 800px;
  height: 480px;

  overflow: hidden;

  font-family:
    Arial,
    Helvetica,
    sans-serif;

  background: #ffffff;
  color: #000000;

}


/* =========================================================
   FULL PAGE

   LEFT  = 440px
   RIGHT = 360px
   ========================================================= */

.page {

  width: 800px;
  height: 480px;

  display: grid;

  grid-template-columns:
    440px
    360px;

  border:
    2px solid #000000;

}


/* =========================================================
   LEFT PANEL

   Header      = 40px
   Fixtures    = 280px
   Squad Watch = remaining space
   ========================================================= */

.left {

  height: 476px;

  display: grid;

  grid-template-rows:
    40px
    280px
    156px;

  border-right:
    2px solid #000000;

}


/* =========================================================
   TOP HEADER
   ========================================================= */

.header {

  display: flex;

  align-items: center;

  justify-content:
    space-between;

  padding:
    0 10px;

  border-bottom:
    2px solid #000000;

}


.title {

  font-size: 20px;

  font-weight: 900;

  letter-spacing:
    0.4px;

}


.updated {

  font-size: 10px;

  font-weight: 700;

  text-align: right;

}


/* =========================================================
   FIXTURE SECTION
   ========================================================= */

.fixtures {

  padding:
    7px 10px
    4px 10px;

  overflow: hidden;

}


/* =========================================================
   FIXTURE SECTION TITLE
   ========================================================= */

.section-title {

  height: 27px;

  display: flex;

  align-items: flex-start;

  font-size: 15px;

  font-weight: 900;

  text-transform:
    uppercase;

  border-bottom:
    2px solid #000000;

}


/* =========================================================
   INDIVIDUAL FIXTURE

   Four fixtures use approximately
   59px each.
   ========================================================= */

.fixture {

  height: 59px;

  display: grid;

  grid-template-columns:
    65px
    1fr
    67px;

  align-items: center;

  border-bottom:
    1px solid #777777;

}


/* Remove final line */

.fixture:last-child {

  border-bottom:
    none;

}


/* =========================================================
   FIXTURE DATE
   ========================================================= */

.fixture-date {

  font-size: 14px;

  font-weight: 900;

}


/* =========================================================
   TEAM NAMES
   ========================================================= */

.fixture-match {

  font-size: 14px;

  font-weight: 700;

  line-height:
    1.25;

}


/* Arsenal is always emphasised */

.fixture-match .arsenal {

  font-weight: 900;

}


/* =========================================================
   RIGHT SIDE OF FIXTURE

   Holds:
   competition
   time
   ========================================================= */

.fixture-info {

  display: flex;

  flex-direction: column;

  align-items: flex-end;

  justify-content: center;

  gap: 3px;

}


/* Match time */

.fixture-time {

  font-size: 10px;

  font-weight: 800;

  white-space:
    nowrap;

}


/* Competition label */

.fixture-comp {

  font-size: 8px;

  font-weight: 900;

  text-transform:
    uppercase;

  border:
    1px solid #000000;

  padding:
    1px 3px;

}


/* Hide empty competition label */

.fixture-comp:empty {

  display: none;

}


/* =========================================================
   SQUAD WATCH
   ========================================================= */

.squad {

  border-top:
    2px solid #000000;

  padding:
    6px 10px
    4px 10px;

  overflow: hidden;

}


/* =========================================================
   SQUAD WATCH HEADER
   ========================================================= */

.squad-title {

  height: 27px;

  display: flex;

  justify-content:
    space-between;

  align-items:
    flex-start;

  border-bottom:
    1px solid #777777;

}


.squad-title h2 {

  margin: 0;

  font-size: 15px;

  font-weight: 900;

}


.squad-subtitle {

  margin-top: 2px;

  font-size: 9px;

  font-weight: 700;

}


/* =========================================================
   SQUAD WATCH ROW
   ========================================================= */

.watch-item {

  display: grid;

  grid-template-columns:
    65px
    132px
    1fr;

  height: 28px;

  align-items: center;

  border-bottom:
    1px solid #bbbbbb;

}


.watch-item:last-child {

  border-bottom:
    none;

}


/* Injury / Transfer */

.watch-type {

  font-size: 9px;

  font-weight: 900;

}


/* Player name */

.watch-player {

  font-size: 12px;

  font-weight: 900;

  white-space:
    nowrap;

  overflow:
    hidden;

  text-overflow:
    ellipsis;

}


/* Status */

.watch-status {

  font-size: 10px;

  font-weight: 500;

  text-align: right;

  white-space:
    nowrap;

  overflow:
    hidden;

  text-overflow:
    ellipsis;

}


/* =========================================================
   RIGHT PANEL
   PREMIER LEAGUE TABLE
   ========================================================= */

.table-panel {

  height: 476px;

  padding:
    7px 7px
    5px 7px;

  overflow: hidden;

}


/* =========================================================
   LEAGUE TABLE TITLE
   ========================================================= */

.table-heading {

  height: 29px;

  display: flex;

  justify-content:
    space-between;

  align-items:
    flex-start;

  border-bottom:
    2px solid #000000;

}


.table-heading h2 {

  margin: 0;

  font-size: 17px;

  font-weight: 900;

}


.season {

  margin-top: 2px;

  font-size: 9px;

  font-weight: 800;

}


/* =========================================================
   TABLE COLUMN HEADINGS
   ========================================================= */

.table-header {

  display: grid;

  grid-template-columns:
    24px
    1fr
    26px
    29px
    34px;

  height: 21px;

  align-items: center;

  font-size: 9px;

  font-weight: 900;

  border-bottom:
    2px solid #000000;

}


.table-header div {

  text-align: center;

}


.table-header .team {

  text-align: left;

}


/* =========================================================
   LEAGUE TABLE ROW

   20 teams x 20px = 400px
   ========================================================= */

.table-row {

  display: grid;

  grid-template-columns:
    24px
    1fr
    26px
    29px
    34px;

  height: 20px;

  align-items: center;

  font-size: 10px;

  border-bottom:
    1px solid #dddddd;

}


.table-row div {

  text-align: center;

}


/* Team name */

.table-row .team {

  text-align: left;

  font-weight: 700;

  white-space:
    nowrap;

  overflow:
    hidden;

  text-overflow:
    ellipsis;

}


/* =========================================================
   ARSENAL HIGHLIGHT
   ========================================================= */

.table-row.arsenal-row {

  font-weight: 900;

  border-top:
    2px solid #000000;

  border-bottom:
    2px solid #000000;

}


.table-row.arsenal-row .team {

  font-weight: 900;

}


/* =========================================================
   ERROR MESSAGE
   ========================================================= */

.error {

  padding: 20px;

  font-size: 18px;

  font-weight: 700;

}


</style>

</head>


<body>


<div class="page">


<!-- =======================================================
     LEFT SIDE
     ======================================================= -->

<section class="left">


<!-- HEADER -->

<div class="header">


  <div class="title">

    ARSENAL

  </div>


  <div
    class="updated"
    id="updated"
  >

    Updating...

  </div>


</div>



<!-- =======================================================
     NEXT 4 FIXTURES
     ======================================================= -->

<div class="fixtures">


  <div class="section-title">

    NEXT 4 FIXTURES

  </div>


  <div id="fixtures">

  </div>


</div>



<!-- =======================================================
     SQUAD WATCH
     ======================================================= -->

<div class="squad">


  <div class="squad-title">


    <h2>

      SQUAD WATCH

    </h2>


    <span class="squad-subtitle">

      Injuries & Transfers

    </span>


  </div>


  <div id="squadWatch">

  </div>


</div>


</section>



<!-- =======================================================
     RIGHT SIDE
     PREMIER LEAGUE TABLE
     ======================================================= -->

<section class="table-panel">


<div class="table-heading">


  <h2>

    PREMIER LEAGUE

  </h2>


  <div class="season">

    2026/27

  </div>


</div>



<!-- TABLE COLUMN HEADINGS -->

<div class="table-header">


  <div>

    #

  </div>


  <div class="team">

    TEAM

  </div>


  <div>

    P

  </div>


  <div>

    GD

  </div>


  <div>

    PTS

  </div>


</div>



<!-- TABLE DATA -->

<div id="standings">

</div>


</section>


</div>



<script>


/* =========================================================
   LOAD FOOTBALL DATA
   ========================================================= */

async function loadFootballData() {


  try {


    const response =
      await fetch(

        './data/football.json?t='
        +
        Date.now()

      );


    if (!response.ok) {


      throw new Error(

        'Unable to load football data'

      );


    }


    const data =
      await response.json();



    renderUpdated(

      data.updated

    );



    renderFixtures(

      data.fixtures

    );



    renderStandings(

      data.standings

    );



    renderSquadWatch(

      data.squadWatch

    );


  }


  catch (error) {


    document.body.innerHTML =

      '<div class="error">'
      +
      'Unable to load Arsenal dashboard.'
      +
      '</div>';


    console.error(

      error

    );


  }


}



/* =========================================================
   UPDATED TIME

   Current JSON may contain:

   "18 Jul 2026"

   Later the automatic updater can provide:

   "18 Jul 04:00 SGT"

   or simply:

   "04:00 SGT"
   ========================================================= */

function renderUpdated(

  updated

) {


  document
    .getElementById(

      'updated'

    )
    .textContent =

      'Updated '
      +
      updated;


}



/* =========================================================
   FIXTURES
   ========================================================= */

function renderFixtures(

  fixtures

) {


  const container =
    document.getElementById(

      'fixtures'

    );



  container.innerHTML =


    fixtures


      .slice(

        0,
        4

      )


      .map(


        fixture => {


          const home =
            highlightArsenal(

              fixture.home

            );


          const away =
            highlightArsenal(

              fixture.away

            );



          /*

          Optional competition support.

          Existing JSON does not need to be changed.

          Later we can add:

          "competition": "UCL"

          or

          "competition": "FA CUP"

          If there is no competition field,
          nothing will appear.

          */


          const competition =

            fixture.competition
            ?
            fixture.competition
            :
            '';



          return `


            <div class="fixture">


              <div class="fixture-date">


                ${fixture.date}


              </div>



              <div class="fixture-match">


                ${home}


                <br>


                ${away}


              </div>



              <div class="fixture-info">


                <div class="fixture-comp">

                  ${competition}

                </div>


                <div class="fixture-time">

                  ${fixture.time}

                </div>


              </div>


            </div>


          `;


        }


      )


      .join('');


}



/* =========================================================
   HIGHLIGHT ARSENAL
   ========================================================= */

function highlightArsenal(

  team

) {


  if (

    team
      .toUpperCase()
      .includes(

        'ARSENAL'

      )

  ) {


    return `


      <span class="arsenal">


        ${team}


      </span>


    `;


  }



  return team;


}



/* =========================================================
   PREMIER LEAGUE TABLE
   ========================================================= */

function renderStandings(

  standings

) {


  const container =
    document.getElementById(

      'standings'

    );



  container.innerHTML =


    standings


      .slice(

        0,
        20

      )


      .map(


        team => {


          const arsenal =

            team.team
              .toLowerCase()
              ===
            'arsenal';



          return `


            <div

              class="
                table-row
                ${
                  arsenal
                  ?
                  'arsenal-row'
                  :
                  ''
                }
              "

            >



              <div>


                ${team.pos}


              </div>



              <div class="team">


                ${team.team}


              </div>



              <div>


                ${team.played}


              </div>



              <div>


                ${formatNumber(

                  team.gd

                )}


              </div>



              <div>


                ${team.pts}


              </div>



            </div>


          `;


        }


      )


      .join('');


}



/* =========================================================
   GOAL DIFFERENCE FORMAT

   Positive:
   +12

   Negative:
   -4

   Zero:
   0
   ========================================================= */

function formatNumber(

  value

) {


  if (

    value > 0

  ) {


    return

      '+'
      +
      value;


  }



  return value;


}



/* =========================================================
   SQUAD WATCH

   Maximum:
   4 items

   Priority sorting:

   Injuries first
   Transfers second
   ========================================================= */

function renderSquadWatch(

  items

) {


  const container =
    document.getElementById(

      'squadWatch'

    );



  const sortedItems =

    [...items]


      .sort(


        (a, b) => {


          const priority = {


            INJURY: 1,

            TRANSFER: 2


          };


          return

            (
              priority[a.type]
              ||
              99
            )

            -

            (
              priority[b.type]
              ||
              99
            );


        }


      )


      .slice(

        0,
        4

      );



  container.innerHTML =


    sortedItems


      .map(


        item => {


          return `


            <div class="watch-item">



              <div class="watch-type">


                ${item.type}


              </div>



              <div class="watch-player">


                ${item.player}


              </div>



              <div class="watch-status">


                ${item.status}


              </div>



            </div>


          `;


        }


      )


      .join('');


}



/* =========================================================
   START PAGE
   ========================================================= */

loadFootballData();


</script>


</body>

</html>
