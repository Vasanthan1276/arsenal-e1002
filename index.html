<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
>

<title>Arsenal Dashboard</title>

<style>

/* =========================================================
   E1002 DISPLAY
   Native target resolution: 800 x 480
   ========================================================= */

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  width: 800px;
  height: 480px;
  overflow: hidden;

  font-family:
    Arial,
    Helvetica,
    sans-serif;

  background: #ffffff;
  color: #000000;
}

/* =========================================================
   MAIN PAGE
   ========================================================= */

.page {

  width: 800px;
  height: 480px;

  display: grid;

  grid-template-columns:
    440px
    360px;

  border: 2px solid #000;
}

/* =========================================================
   LEFT SIDE
   ========================================================= */

.left {

  display: grid;

  grid-template-rows:
    42px
    283px
    151px;

  border-right: 2px solid #000;
}

/* =========================================================
   HEADER
   ========================================================= */

.header {

  display: flex;

  align-items: center;

  justify-content:
    space-between;

  padding:
    0 12px;

  border-bottom:
    2px solid #000;
}

.title {

  font-size: 20px;

  font-weight: 800;

  letter-spacing:
    0.5px;
}

.updated {

  font-size: 11px;

  font-weight: 600;
}

/* =========================================================
   FIXTURES
   ========================================================= */

.fixtures {

  padding:
    6px 10px 5px 10px;

  overflow: hidden;
}

.section-title {

  font-size: 15px;

  font-weight: 800;

  text-transform:
    uppercase;

  margin-bottom:
    4px;
}

.fixture {

  height: 58px;

  display: grid;

  grid-template-columns:
    65px
    1fr
    57px;

  align-items: center;

  border-top:
    1px solid #000;
}

.fixture:first-of-type {

  border-top:
    2px solid #000;
}

.fixture-date {

  font-size: 13px;

  font-weight: 800;
}

.fixture-match {

  font-size: 14px;

  font-weight: 700;

  line-height:
    1.3;
}

.fixture-match .arsenal {

  font-weight:
    900;
}

.fixture-time {

  font-size: 11px;

  font-weight: 700;

  text-align:
    right;
}

/* =========================================================
   SQUAD WATCH
   ========================================================= */

.squad {

  border-top:
    2px solid #000;

  padding:
    6px 10px;
}

.squad-title {

  display: flex;

  justify-content:
    space-between;

  align-items:
    center;

  margin-bottom:
    4px;
}

.squad-title h2 {

  margin: 0;

  font-size: 15px;

  font-weight: 800;
}

.squad-subtitle {

  font-size: 10px;

  font-weight: 600;
}

.watch-item {

  display: grid;

  grid-template-columns:
    64px
    125px
    1fr;

  min-height:
    28px;

  align-items:
    center;

  border-top:
    1px solid #999;
}

.watch-type {

  font-size: 9px;

  font-weight: 900;

  letter-spacing:
    0.2px;
}

.watch-player {

  font-size: 12px;

  font-weight: 800;
}

.watch-status {

  font-size: 11px;

  text-align:
    right;
}

/* =========================================================
   RIGHT SIDE — TABLE
   ========================================================= */

.table-panel {

  height: 476px;

  padding:
    7px 7px;
}

.table-heading {

  height: 30px;

  display: flex;

  justify-content:
    space-between;

  align-items:
    center;

  border-bottom:
    2px solid #000;
}

.table-heading h2 {

  margin: 0;

  font-size: 16px;

  font-weight: 900;
}

.season {

  font-size: 10px;

  font-weight: 700;
}

/* =========================================================
   TABLE HEADER
   ========================================================= */

.table-header {

  display: grid;

  grid-template-columns:
    25px
    1fr
    26px
    30px
    31px;

  height: 21px;

  align-items: center;

  font-size: 9px;

  font-weight: 800;

  border-bottom:
    1px solid #000;
}

.table-header div {

  text-align: center;
}

.table-header .team {

  text-align: left;
}

/* =========================================================
   TABLE ROW
   ========================================================= */

.table-row {

  display: grid;

  grid-template-columns:
    25px
    1fr
    26px
    30px
    31px;

  height: 20px;

  align-items: center;

  font-size: 10.5px;

  border-bottom:
    1px solid #ddd;
}

.table-row div {

  text-align:
    center;
}

.table-row .team {

  text-align:
    left;

  font-weight:
    700;

  white-space:
    nowrap;

  overflow:
    hidden;

  text-overflow:
    ellipsis;
}

/* Highlight Arsenal */

.table-row.arsenal-row {

  border-top:
    2px solid #000;

  border-bottom:
    2px solid #000;

  font-weight:
    900;
}

.table-row.arsenal-row .team {

  font-weight:
    900;
}

/* =========================================================
   ERROR MESSAGE
   ========================================================= */

.error {

  padding:
    20px;

  font-size:
    18px;

  font-weight:
    700;
}

</style>

</head>


<body>


<div class="page">


<!-- =======================================================
     LEFT PANEL
     ======================================================= -->

<section class="left">


<div class="header">

  <div class="title">
    ARSENAL
  </div>

  <div
    class="updated"
    id="updated"
  >
    Updating...
  </div>

</div>


<!-- FIXTURES -->

<div class="fixtures">

  <div class="section-title">
    Next 4 Premier League Fixtures
  </div>

  <div id="fixtures"></div>

</div>


<!-- SQUAD WATCH -->

<div class="squad">

  <div class="squad-title">

    <h2>
      SQUAD WATCH
    </h2>

    <span class="squad-subtitle">
      Injuries & Transfers
    </span>

  </div>

  <div id="squadWatch"></div>

</div>


</section>



<!-- =======================================================
     RIGHT PANEL
     ======================================================= -->

<section class="table-panel">

<div class="table-heading">

  <h2>
    PREMIER LEAGUE
  </h2>

  <div class="season">
    2026/27
  </div>

</div>


<div class="table-header">

  <div>#</div>

  <div class="team">
    TEAM
  </div>

  <div>P</div>

  <div>GD</div>

  <div>PTS</div>

</div>


<div id="standings"></div>


</section>


</div>



<script>

/* =========================================================
   LOAD DATA
   ========================================================= */

async function loadFootballData() {

  try {

    const response =
      await fetch(
        './data/football.json?t='
        +
        Date.now()
      );

    if (!response.ok) {

      throw new Error(
        'Unable to load football data'
      );

    }

    const data =
      await response.json();


    renderUpdated(
      data.updated
    );


    renderFixtures(
      data.fixtures
    );


    renderStandings(
      data.standings
    );


    renderSquadWatch(
      data.squadWatch
    );


  }

  catch (error) {

    document.body.innerHTML =
      '<div class="error">'
      +
      'Unable to load Arsenal dashboard.'
      +
      '</div>';

    console.error(
      error
    );

  }

}


/* =========================================================
   UPDATED DATE
   ========================================================= */

function renderUpdated(
  updated
) {

  document
    .getElementById(
      'updated'
    )
    .textContent =
      'Updated '
      +
      updated;

}


/* =========================================================
   FIXTURES
   ========================================================= */

function renderFixtures(
  fixtures
) {

  const container =
    document.getElementById(
      'fixtures'
    );


  container.innerHTML =
    fixtures
      .slice(
        0,
        4
      )
      .map(

        fixture => {

          const home =
            highlightArsenal(
              fixture.home
            );

          const away =
            highlightArsenal(
              fixture.away
            );


          return `

            <div class="fixture">

              <div class="fixture-date">

                ${fixture.date}

              </div>


              <div class="fixture-match">

                ${home}

                <br>

                ${away}

              </div>


              <div class="fixture-time">

                ${fixture.time}

              </div>

            </div>

          `;

        }

      )
      .join('');

}


/* =========================================================
   ARSENAL HIGHLIGHT
   ========================================================= */

function highlightArsenal(
  team
) {

  if (
    team
      .toUpperCase()
      .includes(
        'ARSENAL'
      )
  ) {

    return `

      <span class="arsenal">

        ${team}

      </span>

    `;

  }


  return team;

}


/* =========================================================
   LEAGUE TABLE
   ========================================================= */

function renderStandings(
  standings
) {

  const container =
    document.getElementById(
      'standings'
    );


  container.innerHTML =
    standings
      .map(

        team => {

          const arsenal =
            team.team
              .toLowerCase()
              ===
            'arsenal';


          return `

            <div
              class="
                table-row
                ${
                  arsenal
                  ?
                  'arsenal-row'
                  :
                  ''
                }
              "
            >

              <div>

                ${team.pos}

              </div>


              <div class="team">

                ${team.team}

              </div>


              <div>

                ${team.played}

              </div>


              <div>

                ${formatNumber(
                  team.gd
                )}

              </div>


              <div>

                ${team.pts}

              </div>

            </div>

          `;

        }

      )
      .join('');

}


/* =========================================================
   GOAL DIFFERENCE
   ========================================================= */

function formatNumber(
  value
) {

  if (
    value
    >
    0
  ) {

    return '+'
      +
      value;

  }


  return value;

}


/* =========================================================
   SQUAD WATCH
   ========================================================= */

function renderSquadWatch(
  items
) {

  const container =
    document.getElementById(
      'squadWatch'
    );


  container.innerHTML =
    items
      .slice(
        0,
        4
      )
      .map(

        item => {

          return `

            <div class="watch-item">


              <div class="watch-type">

                ${item.type}

              </div>


              <div class="watch-player">

                ${item.player}

              </div>


              <div class="watch-status">

                ${item.status}

              </div>


            </div>

          `;

        }

      )
      .join('');

}


/* =========================================================
   START
   ========================================================= */

loadFootballData();

</script>


</body>

</html>
