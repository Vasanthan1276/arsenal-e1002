<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
>

<title>Arsenal Dashboard</title>


<style>


/* =========================================================
   ARSENAL E1002 DASHBOARD
   800 x 480
   ========================================================= */


* {

  box-sizing:
    border-box;

}


html,
body {

  margin: 0;

  padding: 0;

  width: 800px;

  height: 480px;

  overflow: hidden;

  font-family:
    Arial,
    Helvetica,
    sans-serif;

  background:
    #ffffff;

  color:
    #000000;

}


/* =========================================================
   MAIN PAGE
   ========================================================= */


.page {

  width: 800px;

  height: 480px;

  display: grid;

  grid-template-columns:
    440px
    360px;

  border:
    2px solid #000000;

}


/* =========================================================
   LEFT PANEL
   ========================================================= */


.left {

  height: 476px;

  display: grid;

  grid-template-rows:
    40px
    280px
    156px;

  border-right:
    2px solid #000000;

}


/* =========================================================
   HEADER
   ========================================================= */


.header {

  display: flex;

  align-items: center;

  justify-content:
    space-between;

  padding:
    0 10px;

  border-bottom:
    2px solid #000000;

}


.title {

  font-size:
    20px;

  font-weight:
    900;

}


.updated {

  font-size:
    10px;

  font-weight:
    700;

  text-align:
    right;

}


/* =========================================================
   FIXTURES
   ========================================================= */


.fixtures {

  padding:
    7px
    10px
    4px
    10px;

  overflow:
    hidden;

}


.section-title {

  height:
    27px;

  display:
    flex;

  align-items:
    flex-start;

  font-size:
    15px;

  font-weight:
    900;

  border-bottom:
    2px solid #000000;

}


.fixture {

  height:
    59px;

  display:
    grid;

  grid-template-columns:
    65px
    1fr
    72px;

  align-items:
    center;

  border-bottom:
    1px solid #777777;

}


.fixture:last-child {

  border-bottom:
    none;

}


.fixture-date {

  font-size:
    14px;

  font-weight:
    900;

  white-space:
    nowrap;

}


.fixture-match {

  font-size:
    14px;

  font-weight:
    700;

  line-height:
    1.25;

}


.fixture-match .arsenal {

  font-weight:
    900;

}


.fixture-info {

  display:
    flex;

  flex-direction:
    column;

  align-items:
    flex-end;

  justify-content:
    center;

}


.fixture-time {

  font-size:
    11px;

  font-weight:
    900;

  white-space:
    nowrap;

}


/* =========================================================
   SQUAD WATCH
   ========================================================= */


.squad {

  border-top:
    2px solid #000000;

  padding:
    6px
    10px
    4px
    10px;

  overflow:
    hidden;

}


.squad-title {

  height:
    27px;

  display:
    flex;

  justify-content:
    space-between;

  align-items:
    flex-start;

  border-bottom:
    1px solid #777777;

}


.squad-title h2 {

  margin: 0;

  font-size:
    15px;

  font-weight:
    900;

}


.squad-subtitle {

  margin-top:
    2px;

  font-size:
    9px;

  font-weight:
    700;

}


.watch-item {

  display:
    grid;

  grid-template-columns:
    65px
    132px
    1fr;

  height:
    30px;

  align-items:
    center;

  border-bottom:
    1px solid #bbbbbb;

}


.watch-item:last-child {

  border-bottom:
    none;

}


.watch-type {

  font-size:
    9px;

  font-weight:
    900;

}


.watch-player {

  font-size:
    12px;

  font-weight:
    900;

  white-space:
    nowrap;

  overflow:
    hidden;

  text-overflow:
    ellipsis;

}


.watch-status {

  font-size:
    11px;

  text-align:
    right;

  white-space:
    nowrap;

  overflow:
    hidden;

  text-overflow:
    ellipsis;

}


/* =========================================================
   PREMIER LEAGUE PANEL
   ========================================================= */


.table-panel {

  height:
    476px;

  padding:
    7px
    7px
    5px
    7px;

  overflow:
    hidden;

}


.table-heading {

  height:
    29px;

  display:
    flex;

  justify-content:
    space-between;

  align-items:
    flex-start;

  border-bottom:
    2px solid #000000;

}


.table-heading h2 {

  margin:
    0;

  font-size:
    17px;

  font-weight:
    900;

}


.season {

  margin-top:
    2px;

  font-size:
    9px;

  font-weight:
    800;

}


/* =========================================================
   TABLE COLUMNS

   #    22px
   Team flexible
   P    22px
   GF   24px
   GA   24px
   GD   26px
   PTS  30px
   ========================================================= */


.table-header,
.table-row {

  display:
    grid;

  grid-template-columns:

    22px
    minmax(0, 1fr)
    22px
    24px
    24px
    26px
    30px;

  align-items:
    center;

}


.table-header {

  height:
    21px;

  font-size:
    8px;

  font-weight:
    900;

  border-bottom:
    2px solid #000000;

}


.table-row {

  height:
    20px;

  font-size:
    10px;

  border-bottom:
    1px solid #dddddd;

}


.table-header div,
.table-row div {

  text-align:
    center;

}


.table-header .team,
.table-row .team {

  text-align:
    left;

}


.table-row .team {

  font-weight:
    700;

  white-space:
    nowrap;

  overflow:
    hidden;

  text-overflow:
    ellipsis;

}


/* =========================================================
   ARSENAL HIGHLIGHT
   ========================================================= */


.table-row.arsenal-row {

  font-weight:
    900;

  border-top:
    2px solid #000000;

  border-bottom:
    2px solid #000000;

}


.table-row.arsenal-row .team {

  font-weight:
    900;

}


/* =========================================================
   ERROR
   ========================================================= */


.error {

  padding:
    20px;

  font-size:
    18px;

  font-weight:
    700;

}


</style>

</head>


<body>


<div class="page">


<section class="left">


<div class="header">


<div class="title">

ARSENAL

</div>


<div
  class="updated"
  id="updated"
>

Updating...

</div>


</div>



<div class="fixtures">


<div class="section-title">

NEXT 4 FIXTURES

</div>


<div id="fixtures">

</div>


</div>



<div class="squad">


<div class="squad-title">


<h2>

SQUAD WATCH

</h2>


<span class="squad-subtitle">

Injuries & Transfers

</span>


</div>


<div id="squadWatch">

</div>


</div>


</section>



<section class="table-panel">


<div class="table-heading">


<h2>

PREMIER LEAGUE

</h2>


<div class="season">

2026/27

</div>


</div>



<div class="table-header">


<div>

#

</div>


<div class="team">

TEAM

</div>


<div>

P

</div>


<div>

GF

</div>


<div>

GA

</div>


<div>

GD

</div>


<div>

PTS

</div>


</div>



<div id="standings">

</div>


</section>


</div>



<script>


/* =========================================================
   LOAD DATA
   ========================================================= */


async function loadFootballData() {


  try {


    const response =

      await fetch(

        './data/football.json?t='

        +

        Date.now()

      );


    if (!response.ok) {


      throw new Error(

        'Unable to load football data'

      );


    }


    const data =

      await response.json();



    renderUpdated(

      data.updated

    );


    renderFixtures(

      data.fixtures

    );


    renderStandings(

      data.standings

    );


    renderSquadWatch(

      data.squadWatch

    );


  }


  catch (error) {


    document.body.innerHTML =

      '<div class="error">'
      +
      'Unable to load Arsenal dashboard.'
      +
      '</div>';


    console.error(

      error

    );


  }


}



/* =========================================================
   UPDATED
   ========================================================= */


function renderUpdated(updated) {


  document

    .getElementById(

      'updated'

    )

    .textContent =

      'Updated '

      +

      updated;


}



/* =========================================================
   FIXTURES
   ========================================================= */


function renderFixtures(fixtures) {


  const container =

    document.getElementById(

      'fixtures'

    );


  container.innerHTML =


    fixtures


      .slice(

        0,

        4

      )


      .map(


        fixture => {


          const home =

            highlightArsenal(

              fixture.home

            );


          const away =

            highlightArsenal(

              fixture.away

            );


          return `


            <div class="fixture">


              <div class="fixture-date">

                ${fixture.date}

              </div>


              <div class="fixture-match">

                ${home}

                <br>

                ${away}

              </div>


              <div class="fixture-info">

                <div class="fixture-time">

                  ${fixture.time}

                </div>

              </div>


            </div>


          `;


        }


      )


      .join('');


}



/* =========================================================
   HIGHLIGHT ARSENAL
   ========================================================= */


function highlightArsenal(team) {


  if (

    team

      .toUpperCase()

      .includes(

        'ARSENAL'

      )

  ) {


    return `

      <span class="arsenal">

        ${team}

      </span>

    `;


  }


  return team;


}



/* =========================================================
   STANDINGS
   ========================================================= */


function renderStandings(standings) {


  const container =

    document.getElementById(

      'standings'

    );


  container.innerHTML =


    standings


      .slice(

        0,

        20

      )


      .map(


        team => {


          const arsenal =

            team.team

              .toLowerCase()

            ===

            'arsenal';


          return `


            <div

              class="table-row ${
                arsenal
                ?
                'arsenal-row'
                :
                ''
              }"

            >


              <div>

                ${team.pos}

              </div>


              <div class="team">

                ${team.team}

              </div>


              <div>

                ${team.played}

              </div>


              <div>

                ${team.gf ?? 0}

              </div>


              <div>

                ${team.ga ?? 0}

              </div>


              <div>

                ${formatNumber(
                  team.gd
                )}

              </div>


              <div>

                ${team.pts}

              </div>


            </div>


          `;


        }


      )


      .join('');


}



/* =========================================================
   NUMBER FORMAT
   ========================================================= */


function formatNumber(value) {


  if (

    value > 0

  ) {


    return '+' + value;


  }


  return value;


}



/* =========================================================
   SQUAD WATCH
   ========================================================= */


function renderSquadWatch(items) {


  const container =

    document.getElementById(

      'squadWatch'

    );


  const sortedItems =


    [...items]


      .sort(


        (a, b) => {


          const priority = {


            INJURY:
              1,


            TRANSFER:
              2


          };


          return (

            priority[a.type]

            ||

            99

          )

          -

          (

            priority[b.type]

            ||

            99

          );


        }


      )


      .slice(

        0,

        4

      );


  container.innerHTML =


    sortedItems


      .map(


        item => `


          <div class="watch-item">


            <div class="watch-type">

              ${item.type}

            </div>


            <div class="watch-player">

              ${item.player}

            </div>


            <div class="watch-status">

              ${item.status}

            </div>


          </div>


        `


      )


      .join('');


}



/* =========================================================
   START
   ========================================================= */


loadFootballData();


</script>


</body>

</html>
